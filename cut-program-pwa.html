  <!-- Service Worker for offline -->
  <script>
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'cut-program-v1';
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./'])));
          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))));
          self.clients.claim();
        });
        self.addEventListener('fetch', e => {
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
          }).catch(() => caches.match('./'))));
        });
      `;
      const swBlob = new Blob([swCode], {type: 'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
    }
  </script>

  <!-- localStorage polyfill using IndexedDB for PWA storage persistence -->
  <script>
    // Simple async key-value storage using IndexedDB
    window.storage = (() => {
      const DB_NAME = 'cut-program-db';
      const STORE = 'kv';
      let db;
      function openDB() {
        if (db) return Promise.resolve(db);
        return new Promise((res, rej) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
          req.onsuccess = e => { db = e.target.result; res(db); };
          req.onerror = () => rej(req.error);
        });
      }
      return {
        get: async (key) => {
          const d = await openDB();
          return new Promise((res, rej) => {
            const tx = d.transaction(STORE, 'readonly');
            const req = tx.objectStore(STORE).get(key);
            req.onsuccess = () => req.result !== undefined ? res({ key, value: req.result }) : (() => { throw new Error('Key not found: ' + key); })();
            req.onerror = () => rej(req.error);
          });
        },
        set: async (key, value) => {
          const d = await openDB();
          return new Promise((res, rej) => {
            const tx = d.transaction(STORE, 'readwrite');
            const req = tx.objectStore(STORE).put(value, key);
            req.onsuccess = () => res({ key, value });
            req.onerror = () => rej(req.error);
          });
        },
        delete: async (key) => {
          const d = await openDB();
          return new Promise((res, rej) => {
            const tx = d.transaction(STORE, 'readwrite');
            const req = tx.objectStore(STORE).delete(key);
            req.onsuccess = () => res({ key, deleted: true });
            req.onerror = () => rej(req.error);
          });
        },
        list: async (prefix) => {
          const d = await openDB();
          return new Promise((res, rej) => {
            const tx = d.transaction(STORE, 'readonly');
            const req = tx.objectStore(STORE).getAllKeys();
            req.onsuccess = () => {
              const keys = prefix ? req.result.filter(k => k.startsWith(prefix)) : req.result;
              res({ keys });
            };
            req.onerror = () => rej(req.error);
          });
        }
      };
    })();
  </script>

function getProgramDayInfo(dateStr) {
  const d = new Date(dateStr);
  const diffDays = Math.floor((d - PROGRAM_START) / 86400000);
  if (diffDays < 0) return null;
  const weekNum = Math.floor(diffDays / 7) + 1; // 1-based
  const dayIdx = diffDays % 7;
  return { weekNum, dayIdx, diffDays };
}

// ── Storage ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = "workout-logs-v2";
async function loadLogs() {
  try { const r = await window.storage.get(STORAGE_KEY); return r ? JSON.parse(r.value) : {}; }
  catch { return {}; }
}
async function saveLogs(logs) {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(logs)); } catch {}
}
// key: "p{phaseIdx}-d{dayIdx}-w{weekNum}"  e.g. "p0-d0-w1"
function makeLogKey(phaseIdx, dayIdx, weekNum) {
  return `p${phaseIdx}-d${dayIdx}-w${weekNum}`;
}

// ── SetRow ────────────────────────────────────────────────────────────────────
function SetRow({ setIdx, data, onChange, compareData, showCompare }) {
  const vol = data.weight && data.reps ? (parseFloat(data.weight) * parseInt(data.reps)) : 0;
  const prevVol = compareData?.weight && compareData?.reps ? (parseFloat(compareData.weight) * parseInt(compareData.reps)) : 0;
  const improved = showCompare && vol > 0 && prevVol > 0 && vol > prevVol;
  const regressed = showCompare && vol > 0 && prevVol > 0 && vol < prevVol;

  return (
    <div style={{ display: "grid", gridTemplateColumns: "28px 1fr 1fr 1fr", gap: 5, alignItems: "center", padding: "5px 0" }}>
      <div style={{ fontSize: 11, color: MUTED, fontWeight: 700, textAlign: "center" }}>{setIdx + 1}</div>
      <input type="number" placeholder="lbs" value={data.weight}
        onChange={e => onChange({ ...data, weight: e.target.value })}
        style={{ background: "#1E2430", border: "1px solid #2E3440", borderRadius: 6, color: TEXT, fontSize: 14, padding: "7px 8px", width: "100%", boxSizing: "border-box", textAlign: "center" }} />
      <input type="number" placeholder="reps" value={data.reps}
        onChange={e => onChange({ ...data, reps: e.target.value })}
        style={{ background: "#1E2430", border: "1px solid #2E3440", borderRadius: 6, color: TEXT, fontSize: 14, padding: "7px 8px", width: "100%", boxSizing: "border-box", textAlign: "center" }} />
      <div style={{ fontSize: 11, textAlign: "center", fontWeight: 700,
        color: improved ? GREEN : regressed ? "#EF4444" : vol > 0 ? ACCENT : MUTED }}>
        {vol > 0 ? `${vol.toFixed(0)}` : "—"}
        {improved && " ▲"}
        {regressed && " ▼"}
      </div>
    </div>
  );
}

// ── ExerciseLogger ────────────────────────────────────────────────────────────
function ExerciseLogger({ exercise, logData, onUpdate, compareLogData, weekNum }) {
  const numSets = exercise.sets;
  const sets = logData?.sets || Array.from({ length: numSets }, () => ({ weight: "", reps: "" }));
  const compareSets = compareLogData?.sets || [];
  const allDone = sets.every(s => s.weight && s.reps);
  const showCompare = weekNum === 2 && compareSets.length > 0;

  const updateSet = (i, val) => {
    const newSets = [...sets];
    newSets[i] = val;
    onUpdate({ ...logData, sets: newSets, note: logData?.note || "" });
  };

  // Best set comparison
  const w1Best = compareSets.reduce((b, s) => Math.max(b, parseFloat(s.weight || 0)), 0);
  const w2Best = sets.reduce((b, s) => Math.max(b, parseFloat(s.weight || 0)), 0);

  return (
    <div style={{ background: CARD, border: `1px solid ${allDone ? GREEN + "55" : "#282D35"}`, borderRadius: 10, marginBottom: 10, overflow: "hidden" }}>
      <div style={{ padding: "11px 13px", borderBottom: "1px solid #282D35", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontWeight: 700, fontSize: 14 }}>{exercise.name}</div>
          <div style={{ fontSize: 11, color: MUTED, marginTop: 2 }}>{numSets}{" sets · "}{exercise.reps}{" reps · rest "}{exercise.rest}</div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {showCompare && w1Best > 0 && (
            <div style={{ fontSize: 10, color: MUTED, textAlign: "right" }}>
              <span style={{ color: BLUE }}>W1: {w1Best}lbs</span>
              {w2Best > 0 && <span style={{ color: w2Best >= w1Best ? GREEN : "#EF4444" }}>{" → W2: "}{w2Best}lbs</span>}
            </div>
          )}
          {allDone && <span style={{ fontSize: 16 }}>✅</span>}
        </div>
      </div>
      <div style={{ padding: "3px 13px 8px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "28px 1fr 1fr 1fr", gap: 5, padding: "4px 0" }}>
          {["#", "WEIGHT", "REPS", "VOL"].map(h => (
            <div key={h} style={{ fontSize: 9, color: MUTED, fontWeight: 700, letterSpacing: "0.07em", textAlign: "center" }}>{h}</div>
          ))}
        </div>
        {sets.map((s, i) => (
          <SetRow key={i} setIdx={i} data={s} onChange={val => updateSet(i, val)}
            compareData={compareSets[i]} showCompare={showCompare} />
        ))}
        {showCompare && compareSets.length > 0 && (
          <div style={{ marginTop: 6, padding: "6px 8px", background: "#ffffff06", borderRadius: 6 }}>
            <div style={{ fontSize: 10, color: MUTED, fontWeight: 700, marginBottom: 3 }}>WEEK 1 REFERENCE</div>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              {compareSets.map((s, i) => s.weight ? (
                <span key={i} style={{ fontSize: 11, color: BLUE }}>Set {i+1}: {s.weight}{"lbs × "}{s.reps}</span>
              ) : null)}
            </div>
          </div>
        )}
        <input placeholder="Notes (RPE, form cue, etc.)" value={logData?.note || ""}
          onChange={e => onUpdate({ ...logData, sets, note: e.target.value })}
          style={{ marginTop: 6, width: "100%", background: "#1E2430", border: "1px solid #2E3440", borderRadius: 6, color: TEXT, fontSize: 12, padding: "6px 9px", boxSizing: "border-box" }} />
      </div>
    </div>
  );
}

            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 22 }}>
              {phases.map((p, i) => (
                <div key={i} style={{ background: CARD, border: "1px solid #282D35", borderLeft: `3px solid ${p.color}`, borderRadius: 10, padding: "12px 14px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div><div style={{ fontSize: 10, color: p.color, fontWeight: 700, letterSpacing: "0.08em", marginBottom: 1 }}>WEEKS {p.weeks}</div><div style={{ fontWeight: 700, fontSize: 14 }}>{p.label}</div></div>
                  <div style={{ fontSize: 11, color: MUTED }}>{["Build rhythm","Add density + HIIT","Max output, carb cycle"][i]}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 22 }}>
              {[{ label: "Current Weight", val: "190 lbs", sub: "Starting point" },{ label: "Target Weight", val: "~180 lbs", sub: "8-10 lbs fat loss" },{ label: "Calorie Deficit", val: "400-500/day", sub: "~1 lb/week" },{ label: "Protein Target", val: "200g / day", sub: "Muscle protection" },{ label: "Training Days", val: "6 / week", sub: "1 full rest day" },{ label: "Program Start", val: "Sat Jun 13", sub: "Day 1 = Today" }].map((s, i) => (
                <div key={i} style={{ background: CARD, border: "1px solid #282D35", borderRadius: 10, padding: "12px 13px" }}>
                  <div style={{ fontSize: 10, color: MUTED, marginBottom: 3 }}>{s.label}</div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: ACCENT, lineHeight: 1 }}>{s.val}</div>
                  <div style={{ fontSize: 10, color: MUTED, marginTop: 3 }}>{s.sub}</div>
                </div>
              ))}
            </div>
            {mealPlan.tips.map((tip, i) => (
              <div key={i} style={{ background: CARD, border: "1px solid #282D35", borderRadius: 8, padding: "10px 12px", marginBottom: 7, display: "flex", gap: 8 }}>
                <span style={{ color: ACCENT, fontWeight: 800, fontSize: 12, minWidth: 17 }}>{i + 1}</span>
                <span style={{ fontSize: 13, lineHeight: 1.5 }}>{tip}</span>
              </div>
            ))}
          </div>
        )}

        {/* CARB GUIDE TAB */}
        {activeTab === "rules" && (
          <div>
            <div style={{ background: CARD, border: "1px solid #3a3a1a", borderLeft: "3px solid " + ACCENT, borderRadius: 10, padding: "12px 14px", marginBottom: 16 }}>
              <div style={{ fontSize: 10, color: ACCENT, fontWeight: 700, letterSpacing: "0.08em", marginBottom: 4 }}>CARB PHILOSOPHY</div>
              <div style={{ fontSize: 13, lineHeight: 1.6 }}>Carbs are not the enemy — the wrong carbs at the wrong time are. Rotate between gluten-free sources based on when you train and how hard. Variety = better nutrients, less inflammation, more satiety.</div>
            </div>

            {mealPlan.carbSources.map((cat, i) => (
              <div key={i} style={{ background: CARD, border: "1px solid #282D35", borderRadius: 11, padding: "13px 14px", marginBottom: 9 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 20, flexShrink: 0 }}>{cat.icon}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 800, fontSize: 13, color: cat.category === "AVOID / LIMIT" ? "#EF4444" : ACCENT, marginBottom: 4 }}>{cat.category}</div>
                    <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 6 }}>
                      {cat.items.map((item, j) => (
                        <span key={j} style={{ background: cat.category === "AVOID / LIMIT" ? "#EF444420" : "#ffffff0f", border: `1px solid ${cat.category === "AVOID / LIMIT" ? "#EF444440" : "#333"}`, borderRadius: 20, fontSize: 11, padding: "3px 9px", color: cat.category === "AVOID / LIMIT" ? "#EF4444" : TEXT }}>{item}</span>
                      ))}
                    </div>
                    <div style={{ fontSize: 12, color: MUTED, lineHeight: 1.5 }}>{cat.why}</div>
                  </div>
                </div>
              </div>
            ))}

            <div style={{ background: CARD, border: "1px solid #282D35", borderRadius: 11, padding: 14, marginTop: 4 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: MUTED, letterSpacing: "0.1em", marginBottom: 10 }}>REST DAY CARB STRATEGY</div>
              {[
                { meal: "Pre-Workout", training: "Banana / dates / sweet potato", rest: "Skip — no workout" },
                { meal: "Post-Workout", training: "Rice or quinoa (1 cup)", rest: "Skip — no workout" },
                { meal: "Lunch", training: "Lentils / sweet potato", rest: "Half portion or skip" },
                { meal: "Dinner", training: "Plantain / yam / cassava", rest: "Extra veg instead" },
              ].map((row, i) => (
                <div key={i} style={{ padding: "8px 0", borderBottom: i < 3 ? "1px solid #282D35" : "none" }}>
                  <div style={{ fontSize: 10, color: MUTED, fontWeight: 700, marginBottom: 4 }}>{row.meal}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                    <div style={{ fontSize: 11, color: "#3B82F6" }}>Training: {row.training}</div>
                    <div style={{ fontSize: 11, color: "#6B7280" }}>Rest: {row.rest}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
